name: Windows RDP (Ultimate Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setup RDP
      run: |
        net user runneradmin "DucYuz@#2010$!"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Start Tunnel
      shell: powershell
      run: |
        Write-Host "Downloading Playit agent..."
        Invoke-WebRequest -Uri "https://playit-cloud.github.io/playit-agent-cli-win/latest/playit.exe" -OutFile "playit.exe"
        
        Write-Host "Starting tunnel..."
        Start-Process ./playit.exe -ArgumentList "--local-addr 127.0.0.1:3389 --port 3389" -WindowStyle Hidden
        
        Write-Host "Waiting for tunnel initialization..."
        Start-Sleep -s 20
        
        Write-Host "========================================="
        Write-Host "   RDP CONNECTION DETAILS"
        Write-Host "========================================="
        Write-Host "User: runneradmin"
        Write-Host "Pass: DucYuz@#2010$!"
        Write-Host "Address: Check playit.gg dashboard for your TCP address"
        Write-Host "========================================="
