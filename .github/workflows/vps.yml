name: Windows VPS (Ngrok TCP - Fix Chuẩn 64Bit)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Kích hoạt Remote Desktop và Đổi Mật Khẩu
      run: |
        # Đổi mật khẩu tài khoản mặc định runneradmin
        net user runneradmin "DucYuz@#2010$!"
        
        # Mở tính năng Remote Desktop (RDP)
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Tải và Khởi chạy Ngrok TCP
      shell: cmd
      run: |
        echo 🚀 Dang tai ban Ngrok chinh thuc Windows x64...
        curl -L --output ngrok.zip https://bin.equinox.io/c/bNyj1mQcaYp/ngrok-v3-stable-windows-amd64.zip
        
        echo 🚀 Giai nen bang lệnh he thong tar...
        tar -xf ngrok.zip
        
        echo 🚀 Cau hinh Token Ngrok...
        :: 🟢 ÔNG ĐIỀN CHÍNH XÁC AUTHTOKEN NGROK CỦA ÔNG VÀO ĐÂY
        ngrok.exe config add-authtoken "3EWEGi3gzFmjEIXCtl3gOpmQ9ua_3VRBy6msSiB86KLh3r98f"
        
        echo 🚀 Dang mo duong ham TCP cho RDP (Cong 3389)...
        start /b ngrok.exe tcp 3389
        
        echo 🚀 Cho he thong On dinh (Khong dung timeout gay loi)...
        ping 127.0.0.1 -n 10 > nul
        
        echo 🚀 Trich xuat dia chi ket noi tu API...
        curl -s http://127.0.0.1:4040/api/tunnels > tunnels.json
        
        echo =========================================
        echo    🎉 VPS WINDOWS NGROK DA SAN SANG 🎉   
        echo =========================================
        powershell -Command "$json = Get-Content tunnels.json | ConvertFrom-Json; $url = $json.tunnels[0].public_url -replace 'tcp://', ''; Write-Output '📍 Dia chi dien vao PC Name: '"
        powershell -Command "$json = Get-Content tunnels.json | ConvertFrom-Json; $url = $json.tunnels[0].public_url -replace 'tcp://', ''; Write-Output $url"
        echo 👤 Username: runneradmin
        echo 🔑 Password: DucYuz@#2010$!
        echo =========================================

    - name: Treo VPS giu ket noi song 6 tieng
      run: |
        Start-Sleep -s 21600
