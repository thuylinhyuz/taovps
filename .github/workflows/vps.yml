name: Windows VPS (Pinggy TCP - Không Lỗi 404)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Kích hoạt Remote Desktop và Đổi Mật Khẩu
      run: |
        net user runneradmin "DucYuz@#2010$!"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Khởi tạo đường hầm qua Pinggy IO
      shell: cmd
      run: |
        echo 🚀 Dang thiet lap duong ham TCP qua Pinggy...
        
        :: Chạy SSH nền kết nối qua Pinggy để forward cổng RDP 3389
        start /b ssh -o StrictHostKeyChecking=no -p 443 -R 0:localhost:3389 tcp@connect.pinggy.io > pinggy.log 2>&1
        
        echo 🚀 Doi 15 giay de he thong nhan địa chỉ...
        ping 127.0.0.1 -n 15 > nul
        
        echo 🚀 Trich xuat thong tin ket noi tu Log...
        type pinggy.log
        
        echo =========================================
        echo    🎉 VPS WINDOWS PINGGY DA SAN SANG 🎉   
        echo =========================================
        echo 👤 Username: runneradmin
        echo 🔑 Password: DucYuz@#2010$!
        echo =========================================
