name: Windows VPS (Cloudflare Tunnel - Bản Fix Sạch Lỗi User)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Cấu hình mật khẩu và kích hoạt Remote Desktop
      run: |
        # Tạo hẳn một user mới tên là DucYuz với mật khẩu cực mạnh
        net user DucYuz "DucYuz123456" /add
        
        # Đưa user DucYuz vào nhóm Administrators (Quyền tối cao)
        net localgroup Administrators DucYuz /add
        
        # Mở tính năng Remote Desktop (RDP) trên Windows Server
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Tải và Khởi chạy Cloudflare Tunnel
      run: |
        echo "🚀 Đang tải Cloudflare Độc Lập cho Windows..."
        curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
        
        echo "🚀 Đang mở đường hầm RDP công khai..."
        # Chạy Cloudflare ngầm trỏ vào cổng RDP 3389 của Windows
        Start-Process ./cloudflared.exe -ArgumentList "tunnel --url rdp://localhost:3389" -RedirectStandardOutput "cloudflare.log"
        
        # Đợi 12 giây để Cloudflare thiết lập kết nối ổn định và lấy link
        Start-Sleep -s 12
        
        # Đọc file log để xuất link kết nối ra màn hình
        $log = Get-Content cloudflare.log
        $line = $log | Select-String -Pattern "https://[a-zA-Z0-9-]+\.trycloudflare\.com" | Select-Object -First 1
        
        if ($line) {
            $url = [regex]::match($line, "https://[a-zA-Z0-9-]+\.trycloudflare\.com").Value
            $host_clean = $url -replace "https://", ""
            
            Write-Output ""
            Write-Output "========================================="
            Write-Output "   🎉 VPS WINDOWS ĐÃ SẴN SÀNG 🎉         "
            Write-Output "========================================="
            Write-Output "📍 Hostname RDP: $host_clean"
            Write-Output "📍 Port: 3389"
            Write-Output "👤 Username: DucYuz"
            Write-Output "🔑 Password: DucYuz123456"
            Write-Output "========================================="
            Write-Output ""
            Write-Output "👉 Copy đúng cái Hostname đuôi .trycloudflare.com vứt vào app Remote Desktop!"
        } else {
            Write-Output "❌ Không lấy được link. Nội dung log:"
            Get-Content cloudflare.log
        }

    - name: Treo VPS giữ kết nối sống 6 tiếng
      run: |
        Start-Sleep -s 21600
