name: Windows VPS (Ngrok TCP - Bản Fix Dứt Điểm Tải File)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Kích hoạt Remote Desktop và Đổi Mật Khẩu
      run: |
        # Đổi mật khẩu tài khoản mặc định runneradmin
        net user runneradmin "DucYuz@#2010$!"
        
        # Mở tính năng Remote Desktop (RDP) trên hệ thống
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Tải và Khởi chạy Ngrok x64 Chuẩn
      run: |
        Write-Host "🚀 Đang tải Ngrok chính thức bản x64 qua PowerShell..."
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQcaYp/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        
        Write-Host "🚀 Tiến hành giải nén file ZIP..."
        Expand-Archive -Path "ngrok.zip" -DestinationPath "." -Force
        
        Write-Host "🚀 Cấu hình Token Ngrok..."
        # 🟢 ÔNG ĐIỀN CHÍNH XÁC AUTHTOKEN NGROK CỦA ÔNG VÀO ĐÂY NHA
        ./ngrok.exe config add-authtoken "3EWEGi3gzFmjEIXCtl3gOpmQ9ua_3VRBy6msSiB86KLh3r98f"
        
        Write-Host "🚀 Đang mở đường hầm TCP cho cổng RDP 3389..."
        Start-Process ./ngrok.exe -ArgumentList "tcp 3389" -RedirectStandardOutput "ngrok.log"
        
        Write-Host "🚀 Đợi 12 giây để hệ thống ổn định và lấy kết nối..."
        Start-Sleep -s 12
        
        Write-Host "🚀 Trích xuất thông tin kết nối từ API..."
        $ngrok_api = curl -s http://127.0.0.1:4040/api/tunnels | ConvertFrom-Json
        $public_url = $ngrok_api.tunnels[0].public_url
        
        if ($public_url) {
            $clean_url = $public_url -replace "tcp://", ""
            Write-Output ""
            Write-Output "========================================="
            Write-Output "   🎉 VPS WINDOWS NGROK ĐÃ SẴN SÀNG 🎉   "
            Write-Output "========================================="
            Write-Output "📍 Địa chỉ điền vào PC Name: $clean_url"
            Write-Output "👤 Username: runneradmin"
            Write-Output "🔑 Password: DucYuz@#2010$!"
            Write-Output "========================================="
            Write-Output ""
            Write-Output "👉 Copy toàn bộ dòng Địa chỉ vứt vào app Remote Desktop!"
        } else {
            Write-Output "❌ Không lấy được link. Nội dung log Ngrok:"
            Get-Content ngrok.log
        }

    - name: Treo VPS giữ kết nối sống 6 tiếng
      run: |
        Start-Sleep -s 21600
