name: Windows VPS (Cloudflare Tunnel - Dùng User Mặc Định)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Cấu hình mật khẩu và kích hoạt Remote Desktop
      run: |
        # Đổi mật khẩu của chính tài khoản mặc định runneradmin bằng PowerShell siêu cấp
        $Password = ConvertTo-SecureString "DucYuz@#2010$!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password
        
        # Mở tính năng Remote Desktop (RDP) trên hệ thống
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Tải và Khởi chạy Cloudflare Tunnel
      run: |
        echo "🚀 Đang tải Cloudflare Độc Lập cho Windows..."
        curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe
        
        echo "🚀 Đang mở đường hầm RDP công khai..."
        Start-Process ./cloudflared.exe -ArgumentList "tunnel --url rdp://localhost:3389" -RedirectStandardOutput "cloudflare.log"
        
        # Đợi 12 giây để lấy link kết nối
        Start-Sleep -s 12
        
        # Trích xuất link public trycloudflare
        $log = Get-Content cloudflare.log
        $line = $log | Select-String -Pattern "https://[a-zA-Z0-9-]+\.trycloudflare\.com" | Select-Object -First 1
        
        if ($line) {
            $url = [regex]::match($line, "https://[a-zA-Z0-9-]+\.trycloudflare\.com").Value
            $host_clean = $url -replace "https://", ""
            
            Write-Output ""
            Write-Output "========================================="
            Write-Output "   🎉 VPS WINDOWS ĐÃ SẴN SÀNG 🎉         "
            Write-Output "========================================="
            Write-Output "📍 Hostname RDP: $host_clean"
            Write-Output "📍 Port: 3389"
            Write-Output "👤 Username: runneradmin"
            Write-Output "🔑 Password: DucYuz@#2010$!"
            Write-Output "========================================="
            Write-Output ""
            Write-Output "👉 Copy Hostname đuôi .trycloudflare.com vứt vào app Remote Desktop!"
        } else {
            Write-Output "❌ Không lấy được link. Nội dung log:"
            Get-Content cloudflare.log
        }

    - name: Treo VPS giữ kết nối sống 6 tiếng
      run: |
        Start-Sleep -s 21600
