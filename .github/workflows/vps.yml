name: Windows RDP Cloudflare

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          net user runneradmin "P@ssw0rd123"
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 1

      - name: Download Cloudflared
        shell: powershell
        run: |
          Invoke-WebRequest "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile cloudflared.exe

      - name: Start Tunnel
        shell: powershell
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel run --token $env:CF_TUNNEL_TOKEN"
          Start-Sleep -Seconds 20

          Write-Host "==============================="
          Write-Host "RDP READY"
          Write-Host "Cloudflare host: rdp.ducyuz.com"
          Write-Host "Windows user: runneradmin"
          Write-Host "Windows pass: P@ssw0rd123"
          Write-Host "==============================="

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 60
          }
