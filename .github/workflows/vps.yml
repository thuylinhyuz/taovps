name: Windows RDP Ngrok

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download ngrok
        shell: powershell
        run: |
          Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath ngrok -Force
          .\ngrok\ngrok.exe version

      - name: Auth ngrok
        shell: powershell
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          .\ngrok\ngrok.exe config add-authtoken $env:NGROK_AUTH_TOKEN
          .\ngrok\ngrok.exe config check

      - name: Enable RDP
        shell: powershell
        run: |
          net user runneradmin "@cyb3rking"
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 1

      - name: Create RDP Tunnel
        shell: powershell
        run: |
          Start-Process -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp 3389 --log=stdout --log-level=info" -RedirectStandardOutput ngrok.log -RedirectStandardError ngrok.err

          Start-Sleep -Seconds 25

          Write-Host "=== NGROK PROCESS ==="
          Get-Process ngrok -ErrorAction SilentlyContinue

          Write-Host "=== NGROK LOG ==="
          Get-Content ngrok.log -ErrorAction SilentlyContinue

          Write-Host "=== NGROK ERR ==="
          Get-Content ngrok.err -ErrorAction SilentlyContinue

          $tunnels = Invoke-RestMethod "http://127.0.0.1:4040/api/tunnels"
          $publicUrl = $tunnels.tunnels[0].public_url

          $addr = $publicUrl -replace "tcp://",""

          Write-Host "======================================"
          Write-Host "RDP READY"
          Write-Host "Computer: $addr"
          Write-Host "User: runneradmin"
          Write-Host "Password: @cyb3rking"
          Write-Host "======================================"

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 60
          }
