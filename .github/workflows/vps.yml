name: Ubuntu VPS (Ngrok Web Terminal Free Không Thẻ)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Cài đặt SSH và cấu hình tài khoản
      run: |
        echo "runner:123456" | sudo chpasswd
        sudo systemctl start ssh

    - name: Cài đặt Ngrok chuẩn chính thức
      run: |
        echo "🚀 Đang cài đặt Ngrok..."
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y
        
        # 🟢 ĐIỀN API TOKEN NGROK CỦA ÔNG VÀO ĐÂY
        ngrok config add-authtoken "3EWEGi3gzFmjEIXCtl3gOpmQ9ua_3VRBy6msSiB86KLh3r98f"

    - name: Kích hoạt Web Terminal và Ngrok
      run: |
        echo "🚀 Đang cấu hình giao diện Web Terminal..."
        # Tải công cụ gotty để chuyển SSH thành giao diện Web
        curl -sL https://github.com/yudai/gotty/releases/download/v2.0.0-alpha.3/gotty_linux_amd64.tar.gz | tar -xz
        sudo mv gotty /usr/local/bin/
        
        # Chạy gotty ngầm ở cổng 8080, bắt đăng nhập bằng user/pass của VPS
        gotty -w -p 8080 --credential runner:123456 login &
        
        sleep 2
        echo "🚀 Đang mở đường hầm Ngrok HTTP..."
        # Chạy ngrok dạng HTTP trỏ vào cổng 8080 (Không bị bắt add thẻ)
        ngrok http 8080 --log=stdout > ngrok.log &
        
        sleep 5
        sudo apt-get install jq -y > /dev/null
        
        # Tự động lấy link ngrok công khai được cấp
        NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        
        if [ "$NGROK_URL" != "null" ] && [ ! -z "$NGROK_URL" ]; then
          echo ""
          echo "========================================="
          echo "   🎉 VPS NGROK WEB ĐÃ SẴN SÀNG 🎉       "
          echo "========================================="
          echo "🔗 Link vào VPS của ông đây:"
          echo "👉 $NGROK_URL"
          echo "========================================="
          echo "👤 Tài khoản đăng nhập trên Web:"
          echo "📍 Username: runner"
          echo "📍 Password: 123456"
          echo "========================================="
          echo ""
        else
          echo "❌ Lỗi không lấy được link. Kiểm tra log:"
          cat ngrok.log
        fi

        # Giữ VPS sống 6 tiếng
        sleep 21600
