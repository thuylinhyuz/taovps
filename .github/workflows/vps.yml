name: Windows RDP Cloudflare

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          net user runneradmin "P@ssw0rd123"
          net localgroup Administrators runneradmin /add
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Download Cloudflared
        shell: powershell
        run: |
          Invoke-WebRequest "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile cloudflared.exe

      - name: Start Tunnel
        shell: powershell
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          Start-Process .\cloudflared.exe -ArgumentList "tunnel run --token $env:CF_TUNNEL_TOKEN"
          Start-Sleep 20

          Write-Host "======================="
          Write-Host "RDP READY"
          Write-Host "HOST: rdp.ducyuz.com"
          Write-Host "USER: runneradmin"
          Write-Host "PASS: P@ssw0rd123"
          Write-Host "======================="

      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep 60
          }
