name: Windows RDP (Cloudflare Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Setup RDP
      run: |
        net user runneradmin "DucYuz@#2010$!"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Start Tunnel
      shell: powershell
      run: |
        Write-Host "Installing Cloudflare Tunnel..."
        choco install cloudflared -y
        
        Write-Host "Starting tunnel..."
        # Mở hầm TCP đến cổng 3389
        start cloudflared tunnel --url tcp://localhost:3389
        
        Write-Host "Waiting..."
        Start-Sleep -s 15
        
        Write-Host "========================================="
        Write-Host "   RDP READY"
        Write-Host "========================================="
        Write-Host "User: runneradmin"
        Write-Host "Pass: DucYuz@#2010$!"
        Write-Host "Check your Cloudflare Dashboard for the tunnel address"
        Write-Host "========================================="
