name: Ubuntu VPS (Dùng Ngrok Vào Termius)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Đổi mật khẩu SSH & Khởi động SSH Service
      run: |
        echo "runner:123456" | sudo chpasswd
        sudo systemctl start ssh

    - name: Cài đặt và chạy Ngrok
      env:
        NGROK_TOKEN: "3EWEGi3gzFmjEIXCtl3gOpmQ9ua_3VRBy6msSiB86KLh3r98f"
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb [signed-by=/etc/apt/trusted.gpg.d/ngrok.asc] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y
        
        ngrok config add-authtoken $NGROK_TOKEN
        ngrok tcp 22 > /dev/null 2>&1 &
        
        # Vòng lặp chủ động chờ Ngrok lấy được link (tối đa 60 giây)
        echo "Đang kết nối đến hệ thống Ngrok để tạo đường hầm..."
        URL=""
        for i in {1..30}; do
          sleep 2
          URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' 2>/dev/null)
          if [[ "$URL" == "tcp://"* ]]; then
            break
          fi
          echo "Đang đợi Ngrok nhả link kết nối... ($((i*2))s)"
        done

        echo ""
        echo "=== THÔNG TIN ĐIỀN VÀO TERMIUS ==="
        if [ -z "$URL" ] || [ "$URL" = "null" ]; then
          echo "LỖI: Khởi tạo Ngrok thất bại. Vui lòng kiểm tra lại Token!"
        else
          echo "Hostname: $(echo $URL | cut -d/ -f3 | cut -d: -f1)"
          echo "Port: $(echo $URL | cut -d: -f3)"
          echo "Username: runner"
          echo "Password: 123456"
        fi
        echo "=================================="
        echo ""
        
        # Treo VPS 5 tiếng rưỡi
        sleep 19800
