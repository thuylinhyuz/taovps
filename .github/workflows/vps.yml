name: Windows VPS (Localtonet TCP - Bản Fix Link)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Kích hoạt Remote Desktop và Đổi Mật Khẩu
      run: |
        net user runneradmin "DucYuz@#2010$!"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Tải và Khởi chạy Localtonet x64
      run: |
        Invoke-WebRequest -Uri "https://github.com/localtonet/localtonet/releases/download/v2.1.2/localtonet-windows-x64.zip" -OutFile "localtonet.zip"
        Expand-Archive -Path "localtonet.zip" -DestinationPath "." -Force
        
        # Token chuẩn 100% lấy từ ảnh Screenshot_2026-06-01-14-39-55-163_com.android.chrome.jpg
        ./localtonet.exe authtoken OzX6UWcSDwAHMJdeYbjfTV12t9ro71Bh0
        
        # Mở tunnel TCP cổng 3389
        Start-Process ./localtonet.exe -ArgumentList "tcp 3389" -WindowStyle Hidden
        
        Write-Host "🚀 Đã khởi chạy xong. Kiểm tra Tunnel trên trang localtonet.com để lấy địa chỉ!"

    - name: Treo VPS giữ kết nối sống 6 tiếng
      run: |
        Start-Sleep -s 21600
