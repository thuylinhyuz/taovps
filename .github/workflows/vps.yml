name: Windows VPS (Microsoft Dev Tunnels - Bao Chay 100%)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Kích hoạt Remote Desktop và Đổi Mật Khẩu
      run: |
        net user runneradmin "DucYuz@#2010$!"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Khởi tạo đường hầm qua Dev Tunnels Chính Chủ
      shell: cmd
      run: |
        echo 🚀 Dang thiet lap duong ham qua Microsoft Dev Tunnels...
        
        :: Khởi tạo hầm kết nối không cần đăng nhập, mở trực tiếp cổng RDP 3389 sang giao thức TCP công khai
        start /b devtunnel host -p 3389 --protocol tcp --allow-anonymous > devtunnel.log 2>&1
        
        echo 🚀 Doi 15 giay de he thong nhan địa chỉ kết nối...
        ping 127.0.0.1 -n 15 > nul
        
        echo 🚀 Trich xuat thong tin ket noi tu Log...
        type devtunnel.log
        
        echo =========================================
        echo   🎉 VPS WINDOWS MICROSOFT DA SAN SANG 🎉   
        echo =========================================
        echo 👤 Username: runneradmin
        echo 🔑 Password: DucYuz@#2010$!
        echo =========================================
