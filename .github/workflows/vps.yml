name: Ubuntu VPS (Vào thẳng bằng Termius)

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Cài đặt tmate
      run: |
        sudo apt-get update
        sudo apt-get install -y tmate
        
    - name: Khởi chạy tmate lấy thông tin SSH
      run: |
        # Chạy tmate ngầm
        tmate -S /tmp/tmate.sock new-session -d
        tmate -S /tmp/tmate.sock wait tmate
        
        echo "=== THÔNG TIN ĐỂ ĐIỀN VÀO TERMIUS ==="
        # Lệnh này để lấy chuỗi SSH đầy đủ nhằm tách Host và Port
        tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
        echo "====================================="
        
        # Treo VPS 5 tiếng rưỡi
        sleep 19800
