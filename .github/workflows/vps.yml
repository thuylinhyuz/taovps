name: Windows VPS (Microsoft Dev Tunnels - Sửa Lỗi Treo)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Kích hoạt Remote Desktop và Đổi Mật Khẩu
      run: |
        net user runneradmin "DucYuz@#2010$!"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Khởi tạo đường hầm qua Dev Tunnels
      shell: cmd
      run: |
        echo 🚀 Dang khoi tao duong ham va tu dong dong y dieu khoan Microsoft...
        
        :: Them tham so --accept-tos de khong bi ket cho bam phim Y
        start /b devtunnel host -p 3389 --protocol tcp --allow-anonymous --accept-tos > devtunnel.log 2>&1
        
        echo 🚀 Dang doi 15 giay de nhan kết noi...
        ping 127.0.0.1 -n 15 > nul
        
        echo =========================================
        echo          THONG TIN KET NOI VPS           
        echo =========================================
        type devtunnel.log
        echo =========================================
        echo 👤 Username: runneradmin
        echo 🔑 Password: DucYuz@#2010$!
        echo =========================================

    - name: Treo VPS 6 tieng
      run: |
        Start-Sleep -s 21600
