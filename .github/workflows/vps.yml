name: Windows VPS (Playit CLI - Dạng Ubuntu)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Kích hoạt RDP và Mở Cổng
      run: |
        net user runneradmin "DucYuz@#2010$!"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Chạy Playit CLI (Giống Ubuntu)
      shell: powershell
      run: |
        Write-Host "🚀 Đang tải Playit CLI..."
        Invoke-WebRequest -Uri "https://playit-cloud.github.io/playit-agent-cli-win/latest/playit.exe" -OutFile "playit.exe"
        
        Write-Host "🚀 Đang thiết lập đường hầm..."
        # Lệnh này mở thẳng cổng 3389 mà không cần cấu hình gì cả
        Start-Process ./playit.exe -ArgumentList "--local-addr 127.0.0.1:3389 --port 3389" -WindowStyle Hidden
        
        Write-Host "⏳ Đợi hệ thống gán địa chỉ..."
        Start-Sleep -s 15
        
        Write-Host "`n=========================================" -ForegroundColor Green
        Write-Host "   🎉 VPS ĐÃ ONLINE (DẠNG UBUNTU) 🎉" -ForegroundColor Green
        Write-Host "=========================================" -ForegroundColor Green
        Write-Host "👤 User: runneradmin"
        Write-Host "🔑 Pass: DucYuz@#2010$!"
        Write-Host "👉 Địa chỉ: tcp://connect.playit.gg:xxxxx" -ForegroundColor Cyan
        Write-Host "=========================================" -ForegroundColor Green
        Write-Host "Lưu ý: Nếu không hiện port, hãy xem log chi tiết!"
