name: Ubuntu VPS (Cloudflare Tunnel Bất Tử)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Khởi động SSH Service & Đổi mật khẩu
      run: |
        # Đặt mật khẩu đăng nhập SSH cho tài khoản runner
        echo "runner:123456" | sudo chpasswd
        sudo systemctl start ssh

    - name: Cài đặt và kích hoạt Cloudflare Tunnel
      env:
        CF_TOKEN: "eyJhIjoiNGZhYzJjNzIxYTY5ZDRlMjdhYWU0ZjQ3YTliY2RmMDAiLCJ0IjoiZWJiMWUzMTctMGFmZS00ZTYxLTk2NWUtYzAxYWFkNmEyNDJlIiwicyI6Ik9UVXlZMkl3WTJRdE1XTXhPQzAwWkRsbExXRTJNREl0T0dGbFlqYzFZVGhsTmpjeiJ9"
      run: |
        # Tải bản cloudflared chính thức dành cho Linux AMD64
        curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
        chmod +x /usr/local/bin/cloudflared
        
        echo "Đang kích hoạt đường hầm Cloudflare..."
        # Khởi chạy tunnel ngầm và bắt tay với Cloudflare
        cloudflared tunnel --no-autoupdate run --token $CF_TOKEN > /dev/null 2>&1 &
        
        echo ""
        echo "========================================="
        echo "   👉 CLOUDFLARE TUNNEL ĐÃ LÊN SÓNG 👈   "
        echo "========================================="
        echo "User SSH: runner"
        echo "Pass SSH: 123456"
        echo "Trạng thái: Đang kết nối ngầm về Cloudflare..."
        echo "========================================="
        echo ""
        
        # Treo VPS 5 tiếng rưỡi để chạy tool
        sleep 19800
