name: Windows VPS (Ngrok TCP - Choco Auto Install)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Kích hoạt Remote Desktop và Đổi Mật Khẩu
      run: |
        # Đổi mật khẩu tài khoản mặc định runneradmin
        net user runneradmin "DucYuz@#2010$!"
        
        # Mở tính năng Remote Desktop (RDP)
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
    - name: Cài đặt Ngrok tự động qua Chocolatey
      run: |
        Write-Host "🚀 Đang cài đặt Ngrok chính thức qua Choco (Bao sập link)..."
        choco install ngrok -y
        
        Write-Host "🚀 Cấu hình Token Ngrok..."
        # 🟢 ÔNG ĐIỀN CHÍNH XÁC AUTHTOKEN NGROK CỦA ÔNG VÀO ĐÂY
        ngrok config add-authtoken "3EWEGi3gzFmjEIXCtl3gOpmQ9ua_3VRBy6msSiB86KLh3r98f"
        
        Write-Host "🚀 Đang mở đường hầm TCP cho cổng RDP 3389..."
        Start-Process ngrok -ArgumentList "tcp 3389" -RedirectStandardOutput "ngrok.log"
        
        Write-Host "🚀 Đợi 12 giây để hệ thống phân giải link..."
        Start-Sleep -s 12
        
        Write-Host "🚀 Trích xuất thông tin kết nối từ API..."
        $ngrok_api = curl -s http://127.0.0.1:4040/api/tunnels | ConvertFrom-Json
        $public_url = $ngrok_api.tunnels[0].public_url
        
        if ($public_url) {
            $clean_url = $public_url -replace "tcp://", ""
            Write-Output ""
            Write-Output "========================================="
            Write-Output "   🎉 VPS WINDOWS NGROK ĐÃ SẴN SÀNG 🎉   "
            Write-Output "========================================="
            Write-Output "📍 Địa chỉ điền vào PC Name: $clean_url"
            Write-Output "👤 Username: runneradmin"
            Write-Output "🔑 Password: DucYuz@#2010$!"
            Write-Output "========================================="
            Write-Output ""
            Write-Output "👉 Copy toàn bộ dòng Địa chỉ vứt vào app Remote Desktop!"
        } else {
            Write-Output "❌ Không khởi tạo được hầm Ngrok. Nội dung log:"
            Get-Content ngrok.log
        }

    - name: Treo VPS giữ kết nối sống 6 tiếng
      run: |
        Start-Sleep -s 21600
