name: Ubuntu VPS (Dùng Ngrok Vào Thẳng Termius)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Cài đặt SSH và cấu hình tài khoản
      run: |
        echo "runner:123456" | sudo chpasswd
        sudo systemctl start ssh

    - name: Chạy Ngrok xuất link trực tiếp
      run: |
        echo "🚀 Đang tải Ngrok binary..."
        # Tải trực tiếp file nén chính chủ, không qua PPA APT lằng nhằng
        curl -s https://bin.equinox.io/c/bNyj1mQcaMx/ngrok-v3-stable-linux-amd64.tgz --output ngrok.tgz
        tar -xzf ngrok.tgz
        sudo mv ngrok /usr/local/bin/
        
        # Điền Authtoken Ngrok của ông vào đây
        ngrok config add-authtoken "3EWEGi3gzFmjEIXCtl3gOpmQ9ua_3VRBy6msSiB86KLh3r98f" 

        echo "🚀 Đang khởi động đường hầm TCP..."
        # Khởi động ngrok ngầm trỏ vào cổng SSH (TCP 22)
        ngrok tcp 22 --log=stdout > ngrok.log &
        
        # Đợi 5 giây cho ngrok ổn định kết nối
        sleep 5
        
        # Trích xuất địa chỉ public URL từ API nội bộ của Ngrok
        NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        
        if [ "$NGROK_URL" != "null" ] && [ ! -z "$NGROK_URL" ]; then
          # Bóc tách chuỗi tcp://0.tcp.ap.ngrok.io:12345 thành Hostname và Port riêng biệt
          HOST=$(echo $NGROK_URL | sed 's/tcp:\/\///' | cut -d':' -f1)
          PORT=$(echo $NGROK_URL | cut -d':' -f2)
          
          echo ""
          echo "========================================="
          echo "   🎉 VPS NGROK ĐÃ SẴN SÀNG KẾT NỐI 🎉   "
          echo "========================================="
          echo "📍 Hostname: $HOST"
          echo "📍 Port: $PORT"
          echo "👤 Username: runner"
          echo "🔑 Password: 123456"
          echo "========================================="
          echo ""
        else
          echo "❌ Lỗi: Không lấy được link kết nối ngrok. Kiểm tra lại Authtoken nhé!"
          cat ngrok.log
        fi

        # Giữ VPS sống trong 6 tiếng để chạy tool
        sleep 21600
