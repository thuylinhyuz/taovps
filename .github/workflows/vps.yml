name: Ubuntu VPS (Chuẩn Trang Chủ Ngrok)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Cài đặt SSH và cấu hình tài khoản
      run: |
        echo "runner:123456" | sudo chpasswd
        sudo systemctl start ssh

    - name: Cài đặt Ngrok theo đúng trang chủ
      run: |
        echo "🚀 Đang cài đặt Ngrok Agent..."
        # Lệnh cài đặt chính thức từ tài liệu Ngrok dành cho Ubuntu
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y
        
        # Điền chính xác Authtoken thật của ông vào đây
        ngrok config add-authtoken "3EWEGi3gzFmjEIXCtl3gOpmQ9ua_3VRBy6msSiB86KLh3r98f" 

    - name: Khởi động đường hầm và xuất link Termius
      run: |
        echo "🚀 Đang khởi động đường hầm TCP qua cổng 22..."
        # Chạy ngrok ngầm trỏ vào cổng SSH và ghi log ra file
        ngrok tcp 22 --log=stdout > ngrok.log &
        
        # Đợi 5 giây cho ngrok thiết lập kết nối hoàn chỉnh với máy chủ
        sleep 5
        
        # Cài đặt jq để bóc tách chuỗi JSON từ API nội bộ của Ngrok
        sudo apt-get install jq -y > /dev/null
        
        # Trích xuất địa chỉ public URL từ API nội bộ
        NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        
        if [ "$NGROK_URL" != "null" ] && [ ! -z "$NGROK_URL" ]; then
          # Tách chuỗi tcp://0.tcp.ap.ngrok.io:12345 thành Hostname và Port riêng biệt
          HOST=$(echo $NGROK_URL | sed 's/tcp:\/\///' | cut -d':' -f1)
          PORT=$(echo $NGROK_URL | cut -d':' -f2)
          
          echo ""
          echo "========================================="
          echo "   🎉 VPS NGROK ĐÃ SẴN SÀNG KẾT NỐI 🎉   "
          echo "========================================="
          echo "📍 Hostname: $HOST"
          echo "📍 Port: $PORT"
          echo "👤 Username: runner"
          echo "🔑 Password: 123456"
          echo "========================================="
          echo ""
          echo "👉 Ông chỉ việc copy Hostname và Port ở trên điền vào Termius!"
        else
          echo "❌ Lỗi: Không lấy được link kết nối. Kiểm tra log dưới đây:"
          cat ngrok.log
        fi

        # Treo VPS sống trong 6 tiếng để ông chạy tool
        sleep 21600
