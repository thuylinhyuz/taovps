name: Ubuntu VPS (Dùng Ngrok Vào Termius)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Đổi mật khẩu SSH & Khởi động SSH Service
      run: |
        echo "runner:123456" | sudo chpasswd
        sudo systemctl start ssh

    - name: Cài đặt và chạy Ngrok
      env:
        NGROK_TOKEN: "3EWEGi3gzFmjEIXCtl3gOpmQ9ua_3VRBy6msSiB86KLh3r98f"
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.dev/ngrok.asc >/dev/null
        echo "deb [signed-by=/etc/apt/trusted.gpg.dev/ngrok.asc] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.dev/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        
        ngrok config add-authtoken $NGROK_TOKEN
        ngrok tcp 22 > /dev/null 2>&1 &
        
        sleep 5
        echo "=== THÔNG TIN ĐIỀN VÀO TERMIUS ==="
        curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
        echo "=================================="
        
        # Treo VPS 5 tiếng rưỡi
        sleep 19800
