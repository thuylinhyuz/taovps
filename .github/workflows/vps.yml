name: Ubuntu VPS (Dùng LocalXpose Vào Thẳng Termius)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Cài đặt SSH và cấu hình tài khoản
      run: |
        echo "runner:123456" | sudo chpasswd
        sudo systemctl start ssh

    - name: Khởi động LocalXpose lấy link SSH
      run: |
        echo "🚀 Đang cài đặt LocalXpose..."
        # Tải file binary chính thức phiên bản Linux x64
        curl -sL https://localxpose.io/ext/lxpose-linux-amd64.tgz -o lxpose.tgz
        tar -xzf lxpose.tgz
        sudo mv locaxpose /usr/local/bin/locaxpose
        
        echo "⚙️ Đang cấu hình đường hầm TCP..."
        # Khởi chạy đường hầm TCP trỏ thẳng vào cổng SSH (cổng 22)
        locaxpose tunnel tcp --to :22 --log=stdout > localxpose.log &
        
        # Đợi 5 giây cho hệ thống mở cổng thành công
        sleep 5
        
        # Trích xuất địa chỉ IP và Port từ file log công khai
        LX_URL=$(grep -oE 'us\.locaxpose\.io:[0-9]+|eu\.locaxpose\.io:[0-9]+' localxpose.log | head -n 1)
        
        if [ ! -z "$LX_URL" ]; then
          HOST=$(echo $LX_URL | cut -d':' -f1)
          PORT=$(echo $LX_URL | cut -d':' -f2)
          
          echo ""
          echo "========================================="
          echo "   🎉 VPS ĐÃ SẴN SÀNG - KẾT NỐI NGAY 🎉   "
          echo "========================================="
          echo "📍 Hostname: $HOST"
          echo "📍 Port: $PORT"
          echo "👤 Username: runner"
          echo "🔑 Password: 123456"
          echo "========================================="
          echo ""
          echo "👉 Ông copy đúng Hostname và Port ở trên điền vào Termius là xong!"
        else
          echo "❌ Không lấy được link. Nội dung log lỗi chi tiết:"
          cat localxpose.log
        fi

        # Giữ VPS hoạt động liên tục trong 6 tiếng
        sleep 21600
