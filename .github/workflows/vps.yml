name: Windows RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download ngrok
        shell: powershell
        run: |
          Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath ngrok

      - name: Auth ngrok
        shell: powershell
        run: |
          .\ngrok\ngrok.exe config add-authtoken $Env:NGROK_AUTH_TOKEN
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable RDP
        shell: powershell
        run: |
          net user runneradmin "P@ssw0rd123"
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 1

      - name: Start ngrok tunnel
        shell: powershell
        run: |
          Start-Process -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp 3389 --log=stdout" -WindowStyle Hidden
          Start-Sleep -Seconds 15

          $tunnels = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
          $publicUrl = $tunnels.tunnels[0].public_url

          Write-Host "======================================"
          Write-Host "RDP READY"
          Write-Host "Address: $publicUrl"
          Write-Host "User: runneradmin"
          Write-Host "Password: P@ssw0rd123"
          Write-Host "======================================"

      - name: Keep alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 60
          }
