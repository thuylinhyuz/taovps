name: Ubuntu VPS (Dùng Serveo Vào Thẳng Termius)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Cài đặt SSH và cấu hình tài khoản
      run: |
        echo "runner:123456" | sudo chpasswd
        sudo systemctl start ssh

    - name: Khởi động đường hầm Serveo lấy link Termius
      run: |
        echo "🚀 Đang kết nối đường hầm qua Serveo..."
        
        # Chạy ngầm lệnh ssh của serveo kết nối cổng 22 ra ngoài công khai
        ssh -o StrictHostKeyChecking=no -R 80:localhost:22 serveo.net > serveo.log 2>&1 &
        
        # Đợi 5 giây cho hệ thống cấp link
        sleep 5
        
        # Quét log lấy link
        SERVEO_LINK=$(grep -oE 'forwarded from .+' serveo.log | head -n 1)
        
        if [ ! -z "$SERVEO_LINK" ]; then
          # Trích xuất Port được cấp ngẫu nhiên từ Serveo
          PORT=$(echo $SERVEO_LINK | grep -oE '[0-9]+$')
          
          echo ""
          echo "========================================="
          echo "   🎉 VPS SERVEO ĐÃ SẴN SÀNG KẾT NỐI 🎉   "
          echo "========================================="
          echo "📍 Hostname: serveo.net"
          echo "📍 Port: $PORT"
          echo "👤 Username: runner"
          echo "🔑 Password: 123456"
          echo "========================================="
          echo ""
          echo "👉 Ông copy đúng Hostname (serveo.net) và Port ở trên điền vào Termius!"
        else
          echo "❌ Lỗi kết nối Serveo. Thử lại luồng dự phòng 2..."
          # Luồng dự phòng dùng mã hóa riêng biệt
          ssh -o StrictHostKeyChecking=no -R vps:80:localhost:22 serveo.net > serveo_backup.log 2>&1 &
          sleep 5
          cat serveo.log
          cat serveo_backup.log
        fi

        # Giữ VPS sống trong 6 tiếng để chạy tool
        sleep 21600
