name: Windows RDP Pinggy

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        shell: powershell
        run: |
          cmd /c "net user vanducdev Cloud@2026 /add"
          cmd /c "net user vanducdev Cloud@2026"
          cmd /c "net user vanducdev /active:yes"

          cmd /c "net localgroup Administrators vanducdev /add"
          cmd /c "net localgroup ""Remote Desktop Users"" vanducdev /add"

          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          sc.exe config TermService start= auto
          net stop TermService /y
          net start TermService

          Write-Host "=== CHECK PORT 3389 ==="
          netstat -ano | findstr 3389

      - name: Start Pinggy TCP tunnel
        shell: powershell
        run: |
          Write-Host "Starting Pinggy TCP tunnel..."

          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 0:localhost:3389 tcp@a.pinggy.io
